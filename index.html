<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICoMa: Computational Collation System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+Coptic&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Sans+Syriac:wght@400;800&family=Noto+Sans+Devanagari:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"EB Garamond"', 'serif'],
                        mono: ['"IBM Plex Mono"', 'monospace'],
                        // Updated stack to support Coptic, Chinese, Syriac, Devanagari
                        coptic: ['"Noto Sans Coptic"', '"Noto Sans SC"', '"Noto Sans Syriac"', '"Noto Sans Devanagari"', '"EB Garamond"', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        academic: {
                            red: '#c9302c',
                            blue: '#2c3e50',
                            lightBlue: '#34495e',
                            gold: '#8b7355',
                            cream: '#fdfcfa',
                            paper: '#f8f9fa'
                        }
                    }
                }
            }
        }
    </script>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "d3": "https://esm.sh/d3@^7.9.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-academic-cream text-academic-blue antialiased min-h-screen selection:bg-academic-gold selection:text-white">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
